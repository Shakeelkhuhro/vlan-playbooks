---
- name: Network Automation - VLAN & Interface Management
  hosts: all
  gather_facts: no
  collections:
    - cisco.ios

  tasks:

    ###############################################################
    # INPUT VALIDATION (TASK-BASED SAFE LOGIC)
    ###############################################################

    - name: Validate Input Parameters
      ansible.builtin.assert:
        that:
          - task_type is defined
          - task_type in ["create_vlan", "delete_vlan", "interface_up", "interface_down"]

          - >
            (task_type == "create_vlan" and vlan_id is defined and vlan_id | string | length > 0)
            or
            (task_type == "delete_vlan" and vlan_id is defined and vlan_id | string | length > 0)
            or
            (task_type == "interface_up" and interface_name is defined and interface_name | string | length > 0)
            or
            (task_type == "interface_down" and interface_name is defined and interface_name | string | length > 0)

        fail_msg: "Missing required input for selected task_type"

    ###############################################################
    # SAFE VARIABLE PREPARATION
    ###############################################################

    - name: Set Safe VLAN Name
      set_fact:
        safe_vlan_name: "{{ vlan_name | default('AWX_VLAN') | trim }}"
      when: task_type == "create_vlan"

    ###############################################################
    # VLAN CREATE
    ###############################################################

    - name: Create VLAN
      cisco.ios.ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ safe_vlan_name }}
      when: task_type == "create_vlan"
      register: result

    ###############################################################
    # VLAN DELETE
    ###############################################################

    - name: Delete VLAN
      cisco.ios.ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: task_type == "delete_vlan"
      register: result

    ###############################################################
    # INTERFACE DOWN
    ###############################################################

    - name: Interface Shutdown
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - shutdown
      when: task_type == "interface_down"
      register: result

    ###############################################################
    # INTERFACE UP
    ###############################################################

    - name: Interface No Shutdown
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - no shutdown
      when: task_type == "interface_up"
      register: result

    ###############################################################
    # SHOW APPLIED CHANGES (SAFE OUTPUT)
    ###############################################################

    - name: Show Applied Changes
      debug:
        msg: "{{ result.updates | default(result.commands | default('Configuration Applied Successfully')) }}"
      when: result is defined

    ###############################################################
    # VLAN VERIFICATION
    ###############################################################

    - name: Verify VLAN
      cisco.ios.ios_command:
        commands:
          - show vlan id {{ vlan_id }}
      when: task_type in ["create_vlan", "delete_vlan"]
      register: vlan_verify_output
      failed_when: false

    ###############################################################
    # INTERFACE VERIFICATION
    ###############################################################

    - name: Verify Interface
      cisco.ios.ios_command:
        commands:
          - show interfaces {{ interface_name }} status
      when: task_type in ["interface_up", "interface_down"]
      register: interface_verify_output
      failed_when: false

    ###############################################################
    # DISPLAY VLAN OUTPUT
    ###############################################################

    - name: Show VLAN Verification Output
      debug:
        var: vlan_verify_output.stdout_lines | default("No VLAN verification executed")
      when: vlan_verify_output is defined

    ###############################################################
    # DISPLAY INTERFACE OUTPUT
    ###############################################################

    - name: Show Interface Verification Output
      debug:
        var: interface_verify_output.stdout_lines | default("No Interface verification executed")
      when: interface_verify_output is defined

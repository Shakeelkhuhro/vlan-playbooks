---
- name: Network Changes
  hosts: all
  gather_facts: no
  collections:
    - cisco.ios

  tasks:

    ###############################################################
    # VALIDATION
    ###############################################################

    - name: Validate Input
      ansible.builtin.assert:
        that:
          - task_type is defined
          - task_type in ["create_vlan", "delete_vlan", "interface_up", "interface_down"]
          - (task_type in ["create_vlan", "delete_vlan"] and vlan_id is defined) or
            (task_type in ["interface_up", "interface_down"] and interface_name is defined)
        fail_msg: "Missing required parameters"

    ###############################################################
    # APPLY CONFIG
    ###############################################################

    - name: Apply VLAN Create
      cisco.ios.ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ vlan_name | default('AWX_VLAN') }}
      when: task_type == "create_vlan"
      register: result

    - name: Apply VLAN Delete
      cisco.ios.ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: task_type == "delete_vlan"
      register: result

    - name: Interface Down
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - shutdown
      when: task_type == "interface_down"
      register: result

    - name: Interface Up
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - no shutdown
      when: task_type == "interface_up"
      register: result

    ###############################################################
    # SHOW CHANGE RESULT
    ###############################################################

    - name: Show Applied Changes
      debug:
        msg: "{{ result.updates | default(result.commands | default('Configuration Applied')) }}"
      when: result is defined

    ###############################################################
    # VLAN VERIFY
    ###############################################################

    - name: VLAN Verification
      cisco.ios.ios_command:
        commands:
          - show vlan id {{ vlan_id }}
      when: task_type in ["create_vlan", "delete_vlan"]
      register: vlan_result
      failed_when: false

    ###############################################################
    # INTERFACE VERIFY
    ###############################################################

    - name: Interface Verification
      cisco.ios.ios_command:
        commands:
          - show interfaces {{ interface_name }} status
      when: task_type in ["interface_up", "interface_down"]
      register: int_result
      failed_when: false

    ###############################################################
    # FINAL OUTPUT (SAFE)
    ###############################################################

    - name: Show VLAN Output
      debug:
        var: vlan_result.stdout_lines | default("No VLAN verification executed")
      when: vlan_result is defined

    - name: Show Interface Output
      debug:
        var: int_result.stdout_lines | default("No Interface verification executed")
      when: int_result is defined

---
- name: Network Changes
  hosts: all
  gather_facts: no
  collections:
    - cisco.ios

  tasks:

    ###############################################################
    # INPUT VALIDATION (VERY IMPORTANT)
    ###############################################################

    - name: Validate Input Parameters
      ansible.builtin.assert:
        that:
          - task_type is defined
          - task_type in ["create_vlan", "delete_vlan", "interface_up", "interface_down"]
          - (task_type in ["create_vlan", "delete_vlan"] and vlan_id is defined) or
            (task_type in ["interface_up", "interface_down"] and interface_name is defined)
        fail_msg: "Missing or invalid input parameters (vlan_id or interface_name or task_type)"

    ###############################################################
    # CREATE VLAN
    ###############################################################

    - name: Apply Create VLAN Configuration
      cisco.ios.ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ vlan_name | default('AWX_VLAN') }}
      when: task_type == "create_vlan"
      register: current_changes

    ###############################################################
    # DELETE VLAN
    ###############################################################

    - name: Apply Delete VLAN Configuration
      cisco.ios.ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: task_type == "delete_vlan"
      register: current_changes

    ###############################################################
    # INTERFACE DOWN
    ###############################################################

    - name: Apply Interface Shutdown Configuration
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - shutdown
      when: task_type == "interface_down"
      register: current_changes

    ###############################################################
    # INTERFACE UP
    ###############################################################

    - name: Apply Interface No Shutdown Configuration
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - no shutdown
      when: task_type == "interface_up"
      register: current_changes

    ###############################################################
    # SHOW CURRENT CHANGES (SAFE OUTPUT)
    ###############################################################

    - name: Display Current Changes Applied
      debug:
        msg: "{{ current_changes.updates | default(current_changes.commands | default('Configuration Applied Successfully')) }}"
      when: current_changes is defined

    ###############################################################
    # VLAN VERIFICATION (SAFE - NO FAIL)
    ###############################################################

    - name: Verify VLAN Changes
      cisco.ios.ios_command:
        commands:
          - show vlan id {{ vlan_id }}
      when: task_type in ["create_vlan", "delete_vlan"]
      register: vlan_verify_output
      failed_when: false

    ###############################################################
    # INTERFACE VERIFICATION (SAFE - NO FAIL)
    ###############################################################

    - name: Verify Interface Changes
      cisco.ios.ios_command:
        commands:
          - show interfaces {{ interface_name }} status
      when: task_type in ["interface_up", "interface_down"]
      register: interface_verify_output
      failed_when: false

    ###############################################################
    # DISPLAY VLAN VERIFICATION
    ###############################################################

    - name: Show VLAN Verification Output
      debug:
        var: vlan_verify_output.stdout_lines
      when: vlan_verify_output is defined

    ###############################################################
    # DISPLAY INTERFACE VERIFICATION
    ###############################################################

    - name: Show Interface Verification Output
      debug:
        var: interface_verify_output.stdout_lines
      when: interface_verify_output is defined

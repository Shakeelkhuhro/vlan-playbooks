---
- name: Network Changes
  hosts: all
  gather_facts: no

  collections:
    - cisco.ios

  tasks:

    - name: Create VLAN
      ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ vlan_name }}
      when: action == "create_vlan"

    - name: Delete VLAN
      ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: action == "delete_vlan"

    - name: Verify
      ios_command:
        commands:
          - show vlan brief
      register: output

    - debug:
        var: output.stdout_lines

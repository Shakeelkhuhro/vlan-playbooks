---
- name: Network Changes
  hosts: all
  gather_facts: no
  collections:
    - cisco.ios

  tasks:

    ###############################################################
    # CREATE VLAN
    ###############################################################

    - name: Apply Create VLAN Configuration
      cisco.ios.ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ vlan_name | default('AWX_VLAN') }}
      when: task_type == "create_vlan"
      register: current_changes

    ###############################################################
    # DELETE VLAN
    ###############################################################

    - name: Apply Delete VLAN Configuration
      cisco.ios.ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: task_type == "delete_vlan"
      register: current_changes

    ###############################################################
    # INTERFACE DOWN
    ###############################################################

    - name: Apply Interface Shutdown Configuration
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - shutdown
      when: task_type == "interface_down"
      register: current_changes

    ###############################################################
    # INTERFACE UP
    ###############################################################

    - name: Apply Interface No Shutdown Configuration
      cisco.ios.ios_config:
        parents: "interface {{ interface_name }}"
        lines:
          - no shutdown
      when: task_type == "interface_up"
      register: current_changes

    ###############################################################
    # SHOW CURRENT CHANGES
    ###############################################################

    - name: Display Current Changes Applied By Automation
      debug:
        msg: "{{ current_changes.updates | default(current_changes.commands | default('Configuration Applied Successfully')) }}"
      when: current_changes is defined

    ###############################################################
    # VERIFY VLAN TASKS
    ###############################################################

    - name: Verify VLAN Changes
      cisco.ios.ios_command:
        commands:
          - show vlan brief | include {{ vlan_id }}
      when: task_type == "create_vlan" or task_type == "delete_vlan"
      register: vlan_verify_output

    ###############################################################
    # VERIFY INTERFACE TASKS
    ###############################################################

    - name: Verify Interface Changes
      cisco.ios.ios_command:
        commands:
          - show interfaces status | include {{ interface_name }}
      when: task_type == "interface_down" or task_type == "interface_up"
      register: interface_verify_output

    ###############################################################
    # SHOW VLAN VERIFICATION
    ###############################################################

    - name: Show VLAN Verification Output
      debug:
        var: vlan_verify_output.stdout_lines
      when: vlan_verify_output is defined

    ###############################################################
    # SHOW INTERFACE VERIFICATION
    ###############################################################

    - name: Show Interface Verification Output
      debug:
        var: interface_verify_output.stdout_lines
      when: interface_verify_output is defined

---
- name: Network Changes
  hosts: all
  gather_facts: no
  collections:
    - cisco.ios

  tasks:

    - name: Create VLAN
      cisco.ios.ios_config:
        lines:
          - vlan {{ vlan_id }}
          - name {{ vlan_name | default('AWX_VLAN') }}
      when: task_type == "create_vlan"

    - name: Delete VLAN
      cisco.ios.ios_config:
        lines:
          - no vlan {{ vlan_id }}
      when: task_type == "delete_vlan"

    - name: Interface Down
      cisco.ios.ios_config:
        lines:
          - interface {{ interface_name }}
          - shutdown
      when: task_type == "interface_down"

    - name: Interface Up
      cisco.ios.ios_config:
        lines:
          - interface {{ interface_name }}
          - no shutdown
      when: task_type == "interface_up"

    - name: Verify VLANs
      cisco.ios.ios_command:
        commands:
          - show vlan brief
      register: output

    - name: Show Output
      debug:
        var: output.stdout_lines
